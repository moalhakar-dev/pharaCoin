    <style>
        *{margin:0;padding:0;box-sizing:border-box;}

        .toast-container{
          position:fixed;
          top:20px;
          left:50%;

          z-index:9999;

        @keyframes toastIn{

          padding:15px;

        .file-info {

<body>

<div class="toast-container" id="toastContainer"></div>

<div class="header">
  <h1>💰 إيداع الرصيد</h1>
  <div class="back" onclick="goBack()">⬅ رجوع</div>
</div>

<div class="container">

<div class="card">
  <div class="data-field" id="phone">01069806835</div>
  <button onclick="copyText('phone')">نسخ رقم الإيداع</button>

  <br>

  <div class="data-field" id="wallet">TPNgUyRe7GSnazUzakRU3egEU4XBS7Pu5h</div>
  <button onclick="copyText('wallet')">نسخ عنوان محفظة USDT</button>

  <div class="note">💱 ملحوظة: 1$ = 50 جنيه</div>
</div>

<div class="card">

<select id="method" onchange="changePlaceholder()">
  <option value="">اختر طريقة الإيداع</option>
  <option value="فودافون كاش">فودافون كاش</option>
  <option value="اتصالات كاش">اتصالات كاش</option>
  <option value="اورنج كاش">اورنج كاش</option>
  <option value="USDT">USDT</option>
</select>

<input type="text" id="fromNumber" placeholder="أدخل الرقم الذي تم التحويل منه">

<input type="number" id="amount" placeholder="أدخل مبلغ الإيداع بالجنيه" oninput="calcCoins()" min="50">

<div class="coins-result" id="coinsResult"></div>

<input type="file" id="proof" accept="image/*" onchange="checkFileSize()">

<!-- مؤشر التحميل -->

<button onclick="confirmDeposit(event)" id="submitBtn">تقديم طلب الإيداع</button>

<div class="note">يرجى رفع صورة إثبات التحويل لتأكيد الإيداع</div>

</div>

<button onclick="location.href='dashboard.html'">العودة للوحة التحكم</button>

</div>

<script>
// ========== متغيرات تيليجرام (غير آمنة - للاستخدام المؤقت) ==========
const TELEGRAM_TOKEN = "8535863939:AAFC4qgREiGQC-4c1QCQNrNp3gMprRsQRTs";
const TELEGRAM_CHAT_ID = "6733319757";

// ========== Toast ==========
function showCustomToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
  toast.innerHTML = (icons[type] || '✅') + ' ' + message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ========== Firebase Config ==========
firebase.initializeApp({
  apiKey: "AIzaSyB78JT_cbPMizvzKWBrQoQUe3-zukHrr1U",
  authDomain: "pharacoin.firebaseapp.com",
  projectId: "pharacoin"
});

const auth = firebase.auth();
const db = firebase.firestore();

// التحقق من تسجيل الدخول
auth.onAuthStateChanged(user => {
  if (!user) window.location.href = "login.html";
});

const minAmount = 50;
const MAX_DOCUMENT_SIZE = 900 * 1024; // 900 كيلوبايت (نترك مساحة للحقول الأخرى)
const BASE64_OVERHEAD = 1.37; // Base64 يزيد الحجم بحوالي 37%

function copyText(id){
  const text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
  showCustomToast('تم النسخ', 'success');
}

function changePlaceholder(){
  const method = document.getElementById("method").value;
  const input = document.getElementById("fromNumber");
  input.placeholder = method === "USDT" ? "أدخل عنوان محفظتك" : "أدخل الرقم الذي تم التحويل منه";
}

function calcCoins(){
  const amount = parseFloat(document.getElementById("amount").value);
  const result = document.getElementById("coinsResult");
  if(amount && amount > 0){
    if(amount < minAmount){
      result.innerText = "أقل إيداع 50 جنيه";
    } else {
      const coins = amount * 2;
      result.innerText = `سيتم إضافة ${coins} Coins (تقديري)`;
    }
  } else {
    result.innerText = "";
  }
}

// التحقق من الرقم حسب الشركة
function validatePhoneNumber(phone, method) {
  const clean = phone.replace(/\s+/g, '').replace(/[^\d]/g, '');
  const prefixes = {
    'فودافون كاش': ['010', '015', '016'],
    'اتصالات كاش': ['011'],
    'اورنج كاش': ['012']
  };
  if (!prefixes[method]) return true;
  if (clean.length !== 11) return false;
  return prefixes[method].some(p => clean.startsWith(p));
}

// التحقق من حجم الصورة وحساب الحجم المتوقع بعد التشفير
function checkFileSize() {
  const file = document.getElementById('proof').files[0];
  const fileInfo = document.getElementById('fileInfo');
  
  if (!file) {
    fileInfo.style.display = 'none';
    return;
  }
  
  // حساب الحجم المتوقع بعد تحويل Base64
  const estimatedBase64Size = file.size * BASE64_OVERHEAD;
  const estimatedTotalSize = estimatedBase64Size + 5000; // ~5KB للبيانات الأخرى
  
  fileInfo.style.display = 'block';
  
  if (estimatedTotalSize > MAX_DOCUMENT_SIZE) {
    fileInfo.innerHTML = `⚠️ حجم الصورة كبير جداً. الحجم المتوقع بعد التشفير: ${(estimatedTotalSize / 1024).toFixed(2)} كيلوبايت (الحد الأقصى 900 كيلوبايت)`;
    fileInfo.style.color = '#ff6666';
  } else {
    fileInfo.innerHTML = `✅ حجم مناسب. الحجم المتوقع بعد التشفير: ${(estimatedTotalSize / 1024).toFixed(2)} كيلوبايت`;
    fileInfo.style.color = '#00ff9d';
  }
}

// تحويل الصورة إلى Base64
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

// حساب الحجم التقريبي للمستند
function calculateEstimatedSize(base64Image, otherData) {
  const base64Size = base64Image.length * 2; // تقريب: كل حرف UTF-16 ≈ 2 بايت
  const otherDataSize = JSON.stringify(otherData).length * 2;
  return base64Size + otherDataSize;
}

// ========== دالة إرسال إشعار إلى تيليجرام ==========
async function sendToTelegram(depositData, imageBase64) {
  try {
    // إرسال رسالة نصية تحتوي على التفاصيل
    const message = `
🆕 طلب إيداع جديد
👤 المستخدم: ${depositData.username || 'غير معروف'}
🔹 طريقة الدفع: ${depositData.method}
📞 الرقم المحول منه: ${depositData.fromNumber}
💰 المبلغ: ${depositData.amount} جنيه
🪙 العملات المستحقة: ${depositData.coins} Coins
🆔 معرف المستخدم: ${depositData.userId}
🕐 الوقت: ${new Date().toLocaleString('ar-EG')}
    `;

    // إرسال الرسالة النصية أولاً
    await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_id: TELEGRAM_CHAT_ID,
        text: message,
        parse_mode: 'HTML'
      })
    });

    // إرسال الصورة كملف
    // تحويل Base64 إلى Blob
    const base64Data = imageBase64.split(',')[1]; // إزالة الرأس data:image/...
    const mimeType = imageBase64.match(/:(.*?);/)[1];
    const byteCharacters = atob(base64Data);
    const byteNumbers = new Array(byteCharacters.length);
    for (let i = 0; i < byteCharacters.length; i++) {
      byteNumbers[i] = byteCharacters.charCodeAt(i);
    }
    const byteArray = new Uint8Array(byteNumbers);
    const blob = new Blob([byteArray], { type: mimeType });

    // إنشاء FormData وإرسال الصورة
    const formData = new FormData();
    formData.append('chat_id', TELEGRAM_CHAT_ID);
    formData.append('document', blob, 'proof_image.jpg'); // اسم الملف

    await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendDocument`, {
      method: 'POST',
      body: formData
    });

    console.log('تم إرسال الإشعار إلى تيليجرام');
  } catch (e) {
    console.error('فشل إرسال إشعار تيليجرام:', e);
    // لا نوقف العملية إذا فشل الإشعار
  }
}

async function confirmDeposit(event){
  const method = document.getElementById("method").value;
  const fromNumber = document.getElementById("fromNumber").value.trim();
  const amount = parseFloat(document.getElementById("amount").value);
  const proofFile = document.getElementById("proof").files[0];
  const submitBtn = document.getElementById("submitBtn");
  const loader = document.getElementById("loader");

  // التحقق من البيانات
  if (!method || !fromNumber || !amount || !proofFile) {
    showCustomToast("يرجى إدخال جميع البيانات ورفع صورة الإثبات", "error");
    return;
  }

  if (amount < minAmount) {
    showCustomToast("أقل مبلغ للإيداع هو 50 جنيه", "error");
    return;
  }

  // التحقق من حجم الصورة
  const estimatedBase64Size = proofFile.size * BASE64_OVERHEAD;
  const estimatedTotalSize = estimatedBase64Size + 5000;
  
  if (estimatedTotalSize > MAX_DOCUMENT_SIZE) {
    showCustomToast(`حجم الصورة كبير جداً. الحد الأقصى للصورة هو ${Math.floor(MAX_DOCUMENT_SIZE / BASE64_OVERHEAD / 1024)} كيلوبايت`, "error");
    return;
  }

  if (method !== "USDT") {
    if (!validatePhoneNumber(fromNumber, method)) {
      let msg = "";
      if (method === "فودافون كاش") msg = "رقم فودافون كاش يجب أن يبدأ بـ 010 أو 015 أو 016 ويتكون من 11 رقم";
      else if (method === "اتصالات كاش") msg = "رقم اتصالات كاش يجب أن يبدأ بـ 011 ويتكون من 11 رقم";
      else if (method === "اورنج كاش") msg = "رقم اورنج كاش يجب أن يبدأ بـ 012 ويتكون من 11 رقم";
      showCustomToast(msg, "error");
      return;
    }
  }

  const user = auth.currentUser;
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  // تعطيل الزر وإظهار مؤشر التحميل
  submitBtn.disabled = true;
  submitBtn.innerText = "جاري المعالجة...";
  loader.style.display = "block";

  try {
    // تحويل الصورة إلى Base64
    const proofBase64 = await fileToBase64(proofFile);

    // حساب العملات
    const coins = amount * 2;

    // إعداد بيانات الطلب
    const depositData = {
      userId: user.uid,
      username: localStorage.getItem("profileName") || "",
      method,
      fromNumber,
      amount,
      coins,
      proofBase64: proofBase64,
      status: "pending",
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    // التحقق النهائي من حجم المستند
    const estimatedSize = calculateEstimatedSize(proofBase64, depositData);
    if (estimatedSize > 1048576) { // 1MB
      showCustomToast("المستند كبير جداً (أكثر من 1 ميجابايت). حاول استخدام صورة أصغر.", "error");
      submitBtn.disabled = false;
      submitBtn.innerText = "تقديم طلب الإيداع";
      loader.style.display = "none";
      return;
    }

    // حفظ الطلب في Firestore
    await db.collection("deposits").add(depositData);

    // إرسال إشعار إلى تيليجرام (لا ننتظر حتى يكتمل)
    sendToTelegram(depositData, proofBase64).catch(e => console.error(e));

    showCustomToast("تم إرسال طلب الإيداع بنجاح، سيتم مراجعته قريباً", "success");
    
    // الانتقال إلى صفحة التحويلات بعد ثانيتين
    setTimeout(() => {
      window.location.href = "transactions.html";
    }, 2000);

  } catch (err) {
    console.error(err);
    if (err.code === 'resource-exhausted' || err.message.includes('exceeds maximum size')) {
      showCustomToast("الصورة كبيرة جداً. الحد الأقصى 700 كيلوبايت", "error");
    } else {
      showCustomToast("حدث خطأ: " + err.message, "error");
    }
    submitBtn.disabled = false;
    submitBtn.innerText = "تقديم طلب الإيداع";
    loader.style.display = "none";
  }
}

function goBack(){
  if (document.referrer) history.back();
  else location.href = "dashboard.html";
}
</script>
