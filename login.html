<script>
// ========== دالة عرض الرسائل المخصصة ==========
function showCustomToast(message, type = 'error') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  
  let icon = '❌';
  if(type === 'success') icon = '✅';
  if(type === 'warning') icon = '⚠️';
  if(type === 'info') icon = 'ℹ️';
  
  toast.innerHTML = icon + ' ' + message;
  container.appendChild(toast);
  
  setTimeout(() => {
    toast.remove();
  }, 3000);
}

// ========== التحقق من أن الرقم مصري ==========
function isEgyptianPhone(phone) {
  let cleanPhone = phone.replace(/\s+/g, '').replace(/[^\d+]/g, '');
  const egyptianPatterns = [
    /^01[0-9]{9}$/,           // 010xxxxxxxx
    /^\+201[0-9]{9}$/,        // +2010xxxxxxxx
    /^00201[0-9]{9}$/         // 002010xxxxxxxx
  ];
  return egyptianPatterns.some(pattern => pattern.test(cleanPhone));
}

// ========== التحقق من صيغة البريد الإلكتروني ==========
function isValidEmail(email) {
  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return emailPattern.test(email);
}

// ========== تحويل الرقم إلى بريد وهمي ==========
function convertToFirebaseEmail(input) {
  // إذا كان الإدخال يبدو كبريد إلكتروني، نرجعه كما هو
  if(input.includes('@') && isValidEmail(input)) {
    return input;
  }
  
  // إذا كان رقماً، ننظفه ونحوله إلى بريد وهمي
  let cleanInput = input.replace(/\s+/g, '').replace(/[^\d+]/g, '');
  
  // التأكد من أن الرقم مصري
  if(!isEgyptianPhone(cleanInput)) {
    return null; // رقم غير مصري
  }
  
  // إزالة أي رموز غير أرقام للتحويل
  let digitsOnly = cleanInput.replace(/\D/g, '');
  if(digitsOnly.length === 11 && digitsOnly.startsWith('01')) {
    // 01012345678 → 01012345678@pharacoinsupport.com
    return digitsOnly + '@pharacoinsupport.com';
  } else if(digitsOnly.length === 12 && digitsOnly.startsWith('201')) {
    // 201012345678 → 01012345678@pharacoinsupport.com
    return '0' + digitsOnly.substring(2) + '@pharacoinsupport.com';
  }
  
  return null;
}

// ========== تهيئة Firebase ==========
firebase.initializeApp({
  apiKey: "AIzaSyB78JT_cbPMizvzKWBrQoQUe3-zukHrr1U",
  authDomain: "pharacoin.firebaseapp.com",
  projectId: "pharacoin"
});

const auth = firebase.auth();
const db = firebase.firestore();

// ========== إظهار/إخفاء كلمة المرور ==========
function togglePassword(){
  var pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
  var span = event.currentTarget;
  span.innerText = pass.type === "password" ? "إظهار" : "إخفاء";
}

/* ملء البيانات تلقائياً */
window.onload = function(){
  document.getElementById("email").value = localStorage.getItem("loginEmail") || "";
  document.getElementById("password").value = localStorage.getItem("loginPass") || "";
}

/* تسجيل الدخول */
document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();

  const input = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  // تحويل الإدخال إلى بريد إلكتروني صالح لـ Firebase
  const firebaseEmail = convertToFirebaseEmail(input);
  
  if(!firebaseEmail) {
    showCustomToast('❌ يجب استخدام بريد إلكتروني صحيح أو رقم مصري صالح', 'error');
    return;
  }

  auth.signInWithEmailAndPassword(firebaseEmail, password)
    .then((userCredential)=>{
      const user = userCredential.user;

      db.collection("users").doc(user.uid).get().then((doc)=>{
        if(doc.exists){
          localStorage.setItem("profileName", doc.data().username);
          localStorage.setItem("profileEmail", doc.data().emailOrPhone);
        }
        showCustomToast('✅ تم تسجيل الدخول بنجاح! مرحباً بعودتك 🏺', 'success');
        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1500);
      });
    })
    .catch(error => {
      // رسائل خطأ مخصصة ومفهومة
      let errorMessage = '❌ فشل تسجيل الدخول';
      
      if(error.code === 'auth/invalid-login-credentials' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password'){
        errorMessage = '❌ الرقم أو كلمة المرور غير صحيحة. إذا لم يكن لديك حساب، قم بالتسجيل أولاً.';
      } else if(error.code === 'auth/invalid-email'){
        errorMessage = '❌ صيغة البريد الإلكتروني غير صحيحة';
      } else if(error.code === 'auth/user-disabled'){
        errorMessage = '❌ هذا الحساب معطل';
      } else {
        errorMessage = '❌ ' + error.message;
      }
      
      showCustomToast(errorMessage, 'error');
    });
});
</script>
