    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        body{
          font-family:'Cairo',sans-serif;
          background:#000;
          color:#fff;
          max-width:480px;
          margin:auto;
          padding-bottom:40px;
        }

        /* الخلفية */
        .page-bg{
          position:fixed;
          inset:0;
          background:url("Object/qa.jpg") center/cover no-repeat;
          filter:brightness(0.25) saturate(1.2);
          z-index:-1;
        }

        /* Toast Notifications */
        .toast-container{
          position:fixed;top:20px;left:50%;transform:translateX(-50%);
          z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none;
          max-width:350px;width:90%;
        }
        .toast{
          background:rgba(20,0,0,0.95);
          border:2px solid #FF0000;
          border-radius:12px;
          padding:12px 18px;
          color:white;
          font-family:'Cairo',sans-serif;
          font-size:14px;
          font-weight:bold;
          box-shadow:0 0 30px #FF0000;
          animation:toastIn 0.3s ease-out, toastOut 0.3s ease-in 2.5s forwards;
          display:flex;
          align-items:center;
          gap:10px;
          backdrop-filter:blur(10px);
          text-align:center;
          justify-content:center;
        }
        .toast.success{ border-color:#00ff00; box-shadow:0 0 30px #00ff00; }
        .toast.error{ border-color:#FF0000; box-shadow:0 0 30px #FF0000; }
        .toast.warning{ border-color:#FFA500; box-shadow:0 0 30px #FFA500; }
        @keyframes toastIn{
          from{opacity:0;transform:translateY(-20px);}
          to{opacity:1;transform:translateY(0);}
        }
        @keyframes toastOut{
          from{opacity:1;}
          to{opacity:0;transform:translateY(-20px);}
        }

        /* الهيدر */
        .header{
          display:flex;
          justify-content:space-between;
          align-items:center;
          padding:14px 16px;

<body>

<div class="page-bg"></div>
<div class="toast-container" id="toastContainer"></div>

<div class="header">
  <div class="logo">👑 المستويات</div>
  <div class="back" onclick="goBack()">⬅ رجوع</div>
</div>

<h1 class="page-title">رحلتك الملكية عبر العصور</h1>

<div class="box" id="levelsBox">
  <div style="text-align:center; padding:20px; color:#ccc;">جاري تحميل المستويات...</div>
</div>

<script>
// ========== Toast ==========
function showCustomToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
  toast.innerHTML = (icons[type] || '✅') + ' ' + message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ========== تهيئة Firebase ==========
firebase.initializeApp({
  apiKey: "AIzaSyB78JT_cbPMizvzKWBrQoQUe3-zukHrr1U",
  authDomain: "pharacoin.firebaseapp.com",
  projectId: "pharacoin"
});

const auth = firebase.auth();
const db = firebase.firestore();

// بيانات المستويات
const levels = [
  {era:"🌅 العصر المبكر", family:"الأسرة الأولى", name:"مينا", desc:"موحد القطرين", reward:100},
  {era:"🌅 العصر المبكر", family:"الأسرة الأولى", name:"نعرمر", desc:"مؤسس الحكم المركزي", reward:200},
  {era:"🌅 العصر المبكر", family:"الأسرة الثالثة", name:"زوسر", desc:"باني الهرم المدرج", reward:300},
  {era:"🌅 العصر المبكر", family:"الأسرة الثالثة", name:"سخم خت", desc:"خليفة زوسر", reward:400},
  {era:"🌅 العصر المبكر", family:"الأسرة الرابعة", name:"سنفرو", desc:"مطور فن العمارة", reward:500},
  {era:"🏺 الدولة الوسطى", family:"الأسرة الرابعة", name:"خوفو", desc:"باني الهرم الأكبر", reward:600},
  {era:"🏺 الدولة الوسطى", family:"الأسرة الرابعة", name:"خفرع", desc:"باني الهرم الأوسط", reward:700},
  {era:"🏺 الدولة الوسطى", family:"الأسرة الرابعة", name:"منقرع", desc:"باني الهرم الأصغر", reward:800},
  {era:"🏺 الدولة الوسطى", family:"الأسرة الخامسة", name:"أوسر كاف", desc:"مؤسس عبادة رع", reward:900},
  {era:"🏺 الدولة الوسطى", family:"الأسرة الخامسة", name:"ساحورع", desc:"فاتح الطرق التجارية", reward:1000},
  {era:"⚔️ الدولة الحديثة", family:"الأسرة الثامنة عشر", name:"أحمس", desc:"طارد الهكسوس", reward:1200},
  {era:"⚔️ الدولة الحديثة", family:"الأسرة الثامنة عشر", name:"تحتمس", desc:"فاتح الإمبراطورية", reward:1400},
  {era:"⚔️ الدولة الحديثة", family:"الأسرة الثامنة عشر", name:"حتشبسوت", desc:"ملكة التجارة", reward:1600},
  {era:"⚔️ الدولة الحديثة", family:"الأسرة الثامنة عشر", name:"أمنحتب", desc:"عصر الازدهار", reward:1800},
  {era:"⚔️ الدولة الحديثة", family:"الأسرة التاسعة عشر", name:"رمسيس", desc:"ملك المعارك", reward:2000},
  {era:"🏛️ العصر المتأخر", family:"الأسرة العشرين", name:"مرنبتاح", desc:"حامي الحدود", reward:2300},
  {era:"🏛️ العصر المتأخر", family:"الأسرة السادسة والعشرين", name:"بسماتيك", desc:"موحد البلاد", reward:2600},
  {era:"🏛️ العصر المتأخر", family:"الأسرة السادسة والعشرين", name:"نخاو", desc:"فاتح البحار", reward:2800},
  {era:"🏛️ العصر المتأخر", family:"الأسرة السادسة والعشرين", name:"أحمس الثاني", desc:"عصر السلام", reward:2900},
  {era:"🏛️ العصر المتأخر", family:"الأسرة البطلمية", name:"كليوباترا", desc:"آخر حكام مصر القديمة", reward:3000}
];

let currentUser = null;
let userDocRef = null;
let unsubscribe = null;

// التحقق من تسجيل الدخول والاستماع للبيانات
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    currentUser = user;
    userDocRef = db.collection("users").doc(user.uid);
    
    // استماع مباشر للتحديثات
    if (unsubscribe) unsubscribe();
    unsubscribe = userDocRef.onSnapshot((doc) => {
      if (doc.exists) {
        const data = doc.data();
        const currentLevel = data.currentLevel || 1; // المستوى الحالي للمستخدم
        renderLevels(currentLevel);
      } else {
        // مستخدم جديد: إنشاء مستند بالمستوى 1
        userDocRef.set({
          currentLevel: 1
        }, { merge: true }).catch(err => console.error(err));
        renderLevels(1);
      }
    }, (error) => {
      console.error("خطأ في الاستماع:", error);
      showCustomToast("فشل تحميل المستوى الحالي", "error");
      renderLevels(1); // افتراضي
    });
  }
});

// عرض المستويات
function renderLevels(currentLevel) {
  const box = document.getElementById("levelsBox");
  box.innerHTML = ""; // تفريغ المحتوى السابق
  
  let lastEra = "";
  
  levels.forEach((lvl, i) => {
    const levelNumber = i + 1;
    
    // إضافة عنوان العصر إذا تغير
    if (lvl.era !== lastEra) {
      const eraDiv = document.createElement("h2");
      eraDiv.className = "era-title";
      eraDiv.textContent = lvl.era;
      box.appendChild(eraDiv);
      lastEra = lvl.era;
    }
  
    const div = document.createElement("div");
    div.className = "level-item";
    
    // تحديد حالة المستوى
    if (levelNumber > currentLevel) {
      div.classList.add("locked");
    }
    if (levelNumber === currentLevel) {
      div.classList.add("current");
    }
    
    // إضافة نص توضيحي للمستوى التالي إذا كان مغلقاً
    let noteHtml = "";
    if (levelNumber > currentLevel) {
      noteHtml = `<div class="level-note">🔒 غير متاح بعد</div>`;
    } else if (levelNumber < currentLevel) {
      noteHtml = `<div class="level-note">✅ تم إكماله</div>`;
    } else {
      noteHtml = `<div class="level-note">⭐ المستوى الحالي</div>`;
    }
  
    div.innerHTML = `
      <div class="level-head">
        <div>المستوى ${levelNumber} — <span class="level-name">${lvl.name}</span></div>
        <div class="reward">+${lvl.reward} Coins</div>
      </div>
      <div class="family">${lvl.family}</div>
      <div class="desc">${lvl.desc}</div>
      ${noteHtml}
    `;
  
    box.appendChild(div);
  });
  
  // إضافة رسالة في حالة عدم وجود مستويات (للأمان)
  if (levels.length === 0) {
    box.innerHTML = '<div style="text-align:center; color:#ccc; padding:20px;">لا توجد مستويات حالياً</div>';
  }
}

// دالة العودة
function goBack() {
  location.href = "dashboard.html";
}
</script>
