<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PharaCoin - المستويات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Cairo',sans-serif;
  background:#000;
  color:#fff;
  max-width:480px;
  margin:auto;
  padding-bottom:40px;
}

/* الخلفية */
.page-bg{
  position:fixed;
  inset:0;
  background:url("Object/qa.jpg") center/cover no-repeat;
  filter:brightness(0.25) saturate(1.2);
  z-index:-1;
}

/* الهيدر */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 16px;
  background:rgba(0,0,0,0.85);
  border-bottom:1px solid rgba(255,215,0,0.25);
  backdrop-filter:blur(10px);
}
.logo{
  color:red;
  font-weight:900;
  font-size:16px;
  text-shadow:0 0 10px red;
}
.back{
  color:#00ffcc;
  cursor:pointer;
  font-size:13px;
}

/* العناوين */
.section-title{
  text-align:center;
  margin:18px 0 12px;
  color:gold;
  font-size:18px;
  font-weight:800;
  text-shadow:0 0 8px rgba(255,215,0,0.3);
}

/* الصندوق */
.box{
  margin:0 12px;
  padding:15px;
  background:rgba(0,0,0,0.65);
  border-radius:18px;
  border:1px solid rgba(255,215,0,0.25);
  box-shadow:0 0 20px rgba(139,0,0,0.5);
}

/* العصر */
.era-title{
  margin:15px 0 8px;
  color:#00ffcc;
  font-weight:bold;
  font-size:14px;
  text-align:center;
}

/* عنصر مستوى */
.level-item{
  background:#111;
  border:1px solid red;
  border-radius:12px;
  padding:10px;
  margin-bottom:10px;
  font-size:13px;
  transition:.3s;
}

.level-item.locked{
  opacity:.4;
}

.level-item.current{
  background:#200000;
  border:2px solid gold;
  box-shadow:0 0 15px gold;
}

.level-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.level-name{
  color:gold;
  font-weight:bold;
}

.reward{
  color:#00ff9d;
  font-size:12px;
}

.desc{
  font-size:11px;
  opacity:.8;
  margin-top:4px;
}

.family{
  font-size:11px;
  color:#00ffcc;
  margin-top:2px;
}
</style>
</head>

<body>

<div class="page-bg"></div>

<div class="header">
  <div class="logo">👑 المستويات</div>
  <div class="back" onclick="goBack()">⬅ رجوع</div>
</div>

<div class="section-title">رحلتك الملكية عبر العصور</div>

<div class="box" id="levelsBox"></div>

<script>
// المستوى الحالي من التخزين
let currentLevel = parseInt(localStorage.getItem("userLevel")) || 1;

// بيانات المستويات
const levels = [
{era:"🌅 العصر المبكر", family:"الأسرة الأولى", name:"مينا", desc:"موحد القطرين", reward:100},
{era:"🌅 العصر المبكر", family:"الأسرة الأولى", name:"نعرمر", desc:"مؤسس الحكم المركزي", reward:200},
{era:"🌅 العصر المبكر", family:"الأسرة الثالثة", name:"زوسر", desc:"باني الهرم المدرج", reward:300},
{era:"🌅 العصر المبكر", family:"الأسرة الثالثة", name:"سخم خت", desc:"خليفة زوسر", reward:400},
{era:"🌅 العصر المبكر", family:"الأسرة الرابعة", name:"سنفرو", desc:"مطور فن العمارة", reward:500},

{era:"🏺 الدولة الوسطى", family:"الأسرة الرابعة", name:"خوفو", desc:"باني الهرم الأكبر", reward:600},
{era:"🏺 الدولة الوسطى", family:"الأسرة الرابعة", name:"خفرع", desc:"باني الهرم الأوسط", reward:700},
{era:"🏺 الدولة الوسطى", family:"الأسرة الرابعة", name:"منقرع", desc:"باني الهرم الأصغر", reward:800},
{era:"🏺 الدولة الوسطى", family:"الأسرة الخامسة", name:"أوسر كاف", desc:"مؤسس عبادة رع", reward:900},
{era:"🏺 الدولة الوسطى", family:"الأسرة الخامسة", name:"ساحورع", desc:"فاتح الطرق التجارية", reward:1000},

{era:"⚔️ الدولة الحديثة", family:"الأسرة الثامنة عشر", name:"أحمس", desc:"طارد الهكسوس", reward:1200},
{era:"⚔️ الدولة الحديثة", family:"الأسرة الثامنة عشر", name:"تحتمس", desc:"فاتح الإمبراطورية", reward:1400},
{era:"⚔️ الدولة الحديثة", family:"الأسرة الثامنة عشر", name:"حتشبسوت", desc:"ملكة التجارة", reward:1600},
{era:"⚔️ الدولة الحديثة", family:"الأسرة الثامنة عشر", name:"أمنحتب", desc:"عصر الازدهار", reward:1800},
{era:"⚔️ الدولة الحديثة", family:"الأسرة التاسعة عشر", name:"رمسيس", desc:"ملك المعارك", reward:2000},

{era:"🏛️ العصر المتأخر", family:"الأسرة العشرين", name:"مرنبتاح", desc:"حامي الحدود", reward:2300},
{era:"🏛️ العصر المتأخر", family:"الأسرة السادسة والعشرين", name:"بسماتيك", desc:"موحد البلاد", reward:2600},
{era:"🏛️ العصر المتأخر", family:"الأسرة السادسة والعشرين", name:"نخاو", desc:"فاتح البحار", reward:2800},
{era:"🏛️ العصر المتأخر", family:"الأسرة السادسة والعشرين", name:"أحمس الثاني", desc:"عصر السلام", reward:2900},
{era:"🏛️ العصر المتأخر", family:"الأسرة البطلمية", name:"كليوباترا", desc:"آخر حكام مصر القديمة", reward:3000}
];

const box = document.getElementById("levelsBox");
let lastEra = "";

levels.forEach((lvl, i)=>{
  if(lvl.era !== lastEra){
    const eraDiv = document.createElement("div");
    eraDiv.className = "era-title";
    eraDiv.textContent = lvl.era;
    box.appendChild(eraDiv);
    lastEra = lvl.era;
  }

  const div = document.createElement("div");
  div.className = "level-item";

  if(i+1 > currentLevel){
    div.classList.add("locked");
  }
  if(i+1 === currentLevel){
    div.classList.add("current");
  }

  div.innerHTML = `
    <div class="level-head">
      <div>المستوى ${i+1} — <span class="level-name">${lvl.name}</span></div>
      <div class="reward">+${lvl.reward} Coins</div>
    </div>
    <div class="family">${lvl.family}</div>
    <div class="desc">${lvl.desc}</div>
  `;

  box.appendChild(div);
});

function goBack(){
  location.href="dashboard.html";
}
</script>

</body>
</html>
