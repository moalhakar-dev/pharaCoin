        .toast.warning{ border-color:#FFA500; box-shadow:0 0 30px #FFA500; }
        @keyframes toastIn{

<script>
// ========== Toast ==========
function showCustomToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
  toast.innerHTML = (icons[type] || '✅') + ' ' + message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ========== تهيئة Firebase ==========
firebase.initializeApp({
  apiKey: "AIzaSyB78JT_cbPMizvzKWBrQoQUe3-zukHrr1U",
  authDomain: "pharacoin.firebaseapp.com",
  projectId: "pharacoin"
});

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

// التحقق من تسجيل الدخول
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    currentUser = user;
  }
});

// الذهاب إلى صفحة الإيداع مع تمرير المبلغ
function goDeposit(amount) {
  if (!currentUser) {
    showCustomToast("يجب تسجيل الدخول أولاً", "error");
    setTimeout(() => {
      window.location.href = "login.html";
    }, 1500);
    return;
  }
  
  // تخزين المبلغ في localStorage للاستخدام في صفحة الإيداع (اختياري)
  localStorage.setItem("pendingCoins", amount);
  
  // التوجيه إلى صفحة الإيداع مع تمرير المبلغ في الرابط
  window.location.href = `deposit.html?amount=${amount}`;
}

function goBack() {
  if(document.referrer) {
    history.back();
  } else {
    location.href = "dashboard.html";
  }
}

// ===== آلية النقر للـ Navbar =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioCtx();

function playClick() {
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g);
    g.connect(audioCtx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(700, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1100, audioCtx.currentTime + 0.08);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    o.start();
    o.stop(audioCtx.currentTime + 0.12);
  } catch (e) {}
}

const navItems = document.querySelectorAll('.nav-item');
let effectShown = new Array(navItems.length).fill(false);
let timerId = null;
let currentItem = null;

function showEffect(item) {
  if (item.classList.contains('current-page')) return;
  
  if (timerId) {
    clearTimeout(timerId);
    timerId = null;
    if (currentItem) {
      const oldCircle = currentItem.querySelector('.nav-circle');
      const oldEgypt = currentItem.dataset.egypt;
      oldCircle.textContent = oldEgypt;
      currentItem.classList.remove('showing');
    }
  }
  
  currentItem = item;
  const circle = item.querySelector('.nav-circle');
  const altSymbol = item.dataset.alt;
  circle.textContent = altSymbol;
  item.classList.add('showing');
  
  timerId = setTimeout(() => {
    const circle = currentItem.querySelector('.nav-circle');
    const egyptSymbol = currentItem.dataset.egypt;
    circle.textContent = egyptSymbol;
    currentItem.classList.remove('showing');
    
    timerId = null;
    currentItem = null;
  }, 3000);
}

navItems.forEach((item, index) => {
  item.addEventListener('click', function(e) {
    e.stopPropagation();
    playClick();
    
    if (this.classList.contains('current-page')) return;
    
    if (effectShown[index]) {
      window.location.href = this.dataset.url;
      return;
    }
    
    showEffect(this);
    effectShown[index] = true;
  });
});
</script>
