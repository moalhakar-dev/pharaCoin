<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي • المتحف الكبير</title>
    <meta name="description" content="صفحة الملف الشخصي: بيانات حسابك، رصيدك، مستواك، وإعداداتك.">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Cairo',sans-serif;
            background:url("Object/qa.jpg") no-repeat center center fixed;
            background-size:cover;
            color:white;
            max-width:420px;
            margin:auto;
        }
        body::before{
            content:"";
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.85);
            z-index:-1;
        }
        .header{
            position:sticky;
            top:0;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px;
            background:rgba(0,0,0,0.9);
            border-bottom:1px solid rgba(255,215,0,0.4);
            backdrop-filter:blur(10px);
            z-index:10;
        }
        .header h1{
            font-size:18px;
            font-weight:900;
            color:#ffd700;
            text-shadow:0 0 15px #ffd700;
            margin:0;
        }
        .back{
            font-size:13px;
            color:#00ffcc;
            cursor:pointer;
        }
        .container{
            padding:15px;
            display:flex;
            flex-direction:column;
            gap:18px;
        }
        .card{
            background:rgba(0,0,0,0.7);
            border:2px solid #ffd700;
            border-radius:20px;
            padding:15px;
            box-shadow:0 0 15px rgba(255,215,0,0.4);
        }
        .clickable-card{
            cursor:pointer;
        }
        .clickable-card:hover{
            transform:translateY(-2px);
            box-shadow:0 0 20px #ffd700;
            border-color:#ffaa00;
        }
        .action-row{
            display:flex;
            gap:10px;
            margin-top:5px;
        }
        .action-btn{
            flex:1;
            padding:12px 5px;
            border:none;
            border-radius:12px;
            background:linear-gradient(145deg, #ffd700, #cc9900);
            color:#000;
            font-weight:bold;
            font-size:14px;
            cursor:pointer;
            box-shadow:0 0 15px rgba(255,215,0,0.5);
            transition:all 0.2s;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:5px;
        }
        .action-btn:hover{
            transform:scale(1.03);
            box-shadow:0 0 25px gold;
            background:linear-gradient(145deg, #ffe066, #ffaa00);
        }
        .label{
            color:#ffd700;
            font-weight:bold;
            margin-bottom:6px;
        }
        .data-box{
            background:#111;
            padding:12px;
            border-radius:12px;
            text-align:center;
            border:1px solid #ffd700;
            font-weight:bold;
            color:#00ffcc;
            margin-bottom:10px;
        }
        .balance-item{
            background:#111;
            padding:12px;
            border-radius:12px;
            text-align:center;
            border:1px solid #ffd700;
            font-weight:bold;
            width:100%;
        }
        .balance-item .currency{
            color:#ffd700;
            font-size:12px;
        }
        .balance-item .value{
            color:#00ffcc;
            font-size:22px;
        }
        .progress-bar{
            height:12px;
            background:#1a1a1a;
            border-radius:10px;
            overflow:hidden;
            border:1px solid #ffd700;
            margin-bottom:10px;
        }
        .progress-fill{
            height:100%;
            background:#ffd700;
            width:0%;
            transition:0.5s;
        }
        input{
            width:100%;
            padding:14px;
            border-radius:12px;
            border:1px solid #ffd700;
            background:#0e0e0e;
            color:white;
            font-family:'Cairo',sans-serif;
            margin-bottom:10px;
        }
        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:15px;
            background:#ffd700;
            color:#000;
            font-weight:bold;
            cursor:pointer;
            box-shadow:0 0 15px gold;
            font-family:'Cairo',sans-serif;
            transition:0.2s;
        }
        button:hover{ background:#ffaa00; }
        .policy-links{
            text-align:center;
            margin-top:10px;
        }
        .policy-links a{
            color:#00ff9d;
            font-weight:bold;
            text-decoration:none;
            margin:0 5px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>👤 الملف الشخصي</h1>
    <div class="back" onclick="goBack()">⬅ رجوع</div>
</div>

<div class="container">
    <div class="card">
        <div class="label">اسم المستخدم</div>
        <div class="data-box" id="username">...</div>

        <div class="label">رصيدك (جنيه مصري)</div>
        <div class="balance-item">
            <div class="currency">🇪🇬 EGP</div>
            <div class="value" id="egpBalance">0</div>
        </div>

        <div class="action-row">
            <button class="action-btn" onclick="window.location.href='deposit.html'">💰 إيداع</button>
            <button class="action-btn" onclick="window.location.href='withdraw.html'">💸 سحب</button>
        </div>

        <div class="card clickable-card" onclick="window.location.href='levels.html'" style="margin-top:10px; padding:10px;">
            <div class="label">المستوى</div>
            <div class="data-box" style="margin-bottom:5px;">Level <span id="level">1</span></div>
            <div class="progress-bar">
                <div class="progress-fill" id="xpBar" style="width:0%"></div>
            </div>
            <div style="color:#ffaa00; font-size:12px; margin-top:5px;">اضغط لعرض كل المستويات</div>
        </div>
    </div>

    <div class="card clickable-card" onclick="window.location.href='vip.html'">
        <div class="label">عضوية VIP</div>
        <div class="data-box" id="vipStatus">جارِ التحميل...</div>
        <div style="color:#ffaa00; font-size:12px; text-align:center;">اضغط للترقية أو تفعيل الاشتراك</div>
    </div>

    <div class="card">
        <div class="label">البريد الإلكتروني / رقم الهاتف</div>
        <div class="data-box" id="userContact">...</div>
    </div>

    <div class="card">
        <div class="label">تغيير كلمة المرور</div>
        <input type="password" placeholder="كلمة المرور الجديدة" id="newpass">
        <button onclick="savePass()">حفظ التغيير</button>
    </div>

    <div class="card">
        <button onclick="logout()">🚪 تسجيل خروج</button>
    </div>

    <div class="policy-links">
        <a href="terms.html">📜 الشروط</a> |
        <a href="privacy.html">🔒 الخصوصية</a>
    </div>
</div>

<script>
firebase.initializeApp({
    apiKey: "AIzaSyB78JT_cbPMizvzKWBrQoQUe3-zukHrr1U",
    authDomain: "pharacoin.firebaseapp.com",
    projectId: "pharacoin"
});

const auth = firebase.auth();
const db = firebase.firestore();

function formatNumber(num) {
    return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

auth.onAuthStateChanged(user => {
    if (user) {
        db.collection("users").doc(user.uid).get().then(doc => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById("username").innerText = data.username || "غير متوفر";
                
                const coins = data.coins || 0;
                document.getElementById("egpBalance").innerText = formatNumber(coins);
                
                document.getElementById("userContact").innerText = data.emailOrPhone || user.email || "غير متوفر";

                const xp = data.xp || 0;
                const level = Math.floor(xp / 100) + 1;
                const progress = xp % 100;
                document.getElementById("level").innerText = level;
                document.getElementById("xpBar").style.width = progress + "%";

                const vip = data.vipPlan;
                const expire = data.vipExpire?.toDate?.();
                if (vip && expire && expire > new Date()) {
                    const days = Math.ceil((expire - new Date()) / (1000*60*60*24));
                    document.getElementById("vipStatus").innerHTML = `👑 مشترك في ${vip}<br>ينتهي خلال ${days} يوم`;
                } else {
                    document.getElementById("vipStatus").innerText = "لا يوجد اشتراك VIP";
                }
            }
        });
    } else {
        window.location.href = "login.html";
    }
});

function savePass() {
    const newPass = document.getElementById("newpass").value;
    if (newPass.length < 6) {
        alert("كلمة المرور يجب أن تكون 6 أحرف على الأقل");
        return;
    }
    auth.currentUser.updatePassword(newPass)
        .then(() => alert("تم تغيير كلمة المرور بنجاح"))
        .catch(err => alert(err.message));
}

function logout() {
    auth.signOut().then(() => window.location.href = "login.html");
}

function goBack() {
    if (document.referrer) history.back();
    else location.href = "dashboard.html";
}
</script>
</body>
</html>
