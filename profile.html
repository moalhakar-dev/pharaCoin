<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الملف الشخصي - PharaCoin</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Cairo',sans-serif;
  background:url("Object/qa.jpg") no-repeat center center fixed;
  background-size:cover;
  color:white;
  max-width:420px;
  margin:auto;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  z-index:-1;
}

/* ===== Header ===== */
.header{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  font-size:18px;
  font-weight:900;
  color:#ff0000;
  text-shadow:0 0 15px #ff0000;
  background:rgba(0,0,0,0.9);
  border-bottom:1px solid rgba(255,0,0,0.4);
  backdrop-filter:blur(10px);
  z-index:10;
}

.back{
  font-size:13px;
  color:#00ffcc;
  cursor:pointer;
}

/* ===== Container ===== */
.container{
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

/* ===== Card ===== */
.card{
  background:rgba(0,0,0,0.7);
  border:2px solid #ff0000;
  border-radius:20px;
  padding:15px;
  box-shadow:0 0 15px rgba(255,0,0,0.6);
  transition: transform 0.2s, box-shadow 0.2s;
}

/* تنسيق خاص للبطاقات القابلة للنقر */
.clickable-card {
  cursor: pointer;
}
.clickable-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 20px #ff0000;
  border-color: #ff6600;
}

/* ===== Data ===== */
.label{
  color:#ff0000;
  font-weight:bold;
  margin-bottom:6px;
}

.data-box{
  background:#111;
  padding:12px;
  border-radius:12px;
  text-align:center;
  border:1px solid #ff0000;
  font-weight:bold;
  color:#00ffcc;
  margin-bottom:10px;
}

.progress-bar{
  height:12px;
  background:#1a1a1a;
  border-radius:10px;
  overflow:hidden;
  border:1px solid #ff0000;
  margin-bottom:10px;
}
.progress-fill{
  height:100%;
  background:#ff0000;
  width:0%;
  transition:0.5s;
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ff0000;
  background:#0e0e0e;
  color:white;
  font-family:'Cairo',sans-serif;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:15px;
  background:#ff0000;
  color:white;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 15px #ff0000;
  font-family:'Cairo',sans-serif;
  transition: background 0.2s;
}
button:hover{ background:#cc0000; }

.policy-links{
  text-align:center;
  margin-top:10px;
}
.policy-links a{
  color:#00ff9d;
  font-weight:bold;
  text-decoration:none;
  margin:0 5px;
}
.policy-links a:hover{
  text-decoration:underline;
}
</style>
</head>

<body>

<div class="header">
  <div>👤 الملف الشخصي</div>
  <div class="back" onclick="goBack()">⬅ رجوع</div>
</div>

<div class="container">

<div class="card">
  <div class="label">اسم المستخدم</div>
  <div class="data-box" id="username">...</div>

  <div class="label">رصيدك</div>
  <div class="data-box" id="coins">...</div>

  <!-- بطاقة المستوى - قابلة للنقر -->
  <div class="card clickable-card" onclick="window.location.href='levels.html'" style="margin-top: 10px; padding: 10px;">
    <div class="label">المستوى</div>
    <div class="data-box" style="margin-bottom: 5px;">Level <span id="level">1</span></div>
    <div class="progress-bar">
      <div class="progress-fill" id="xpBar"></div>
    </div>
    <div style="color:#ff9900; font-size:12px; margin-top:5px;">اضغط لعرض كل المستويات</div>
  </div>
</div>

<!-- بطاقة VIP - قابلة للنقر -->
<div class="card clickable-card" onclick="window.location.href='vip.html'">
  <div class="label">عضوية VIP</div>
  <div class="data-box" id="vipStatus">جارِ التحميل...</div>
  <div style="color:#ff9900; font-size:12px; text-align:center;">اضغط للترقية أو تفعيل الاشتراك</div>
</div>

<div class="card">
  <div class="label">البريد الإلكتروني</div>
  <div class="data-box" id="userContact">...</div>
</div>

<div class="card">
  <div class="label">تغيير كلمة المرور</div>
  <input type="password" placeholder="كلمة المرور الجديدة" id="newpass">
  <button onclick="savePass()">حفظ التغيير</button>
</div>

<div class="card">
  <button onclick="logout()">🚪 تسجيل خروج</button>
</div>

<div class="policy-links">
  <a href="terms.html">📜 الشروط</a> |
  <a href="privacy.html">🔒 الخصوصية</a>
</div>

</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyB78JT_cbPMizvzKWBrQoQUe3-zukHrr1U",
  authDomain:"pharacoin.firebaseapp.com",
  projectId:"pharacoin",
  storageBucket:"pharacoin.appspot.com"
});

const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(function(user){
  if(user){
    db.collection("users").doc(user.uid).get().then((doc)=>{
      if(doc.exists){
        const data = doc.data();
        document.getElementById("username").innerText = data.username || "غير متوفر";
        document.getElementById("coins").innerText = (data.balance || 0) + " جنيه";
        document.getElementById("userContact").innerText = data.email || user.email || "غير متوفر";

        let xp = data.xp || 0;
        let level = Math.floor(xp / 100) + 1;
        let progress = xp % 100;

        document.getElementById("level").innerText = level;
        document.getElementById("xpBar").style.width = progress + "%";
      }
    });

    let vip = localStorage.getItem("vipPlan");
    let expire = localStorage.getItem("vipExpire");

    if(vip && expire && new Date(expire) > new Date()){
      let days = Math.ceil((new Date(expire) - new Date()) / (1000*60*60*24));
      document.getElementById("vipStatus").innerHTML =
        "👑 مشترك في "+vip+"<br>ينتهي خلال "+days+" يوم";
    }else{
      document.getElementById("vipStatus").innerText = "لا يوجد اشتراك VIP";
    }

  }else{
    window.location.href="login.html";
  }
});

function savePass(){
  const newPass = document.getElementById("newpass").value;
  if(newPass.length < 6){
    alert("كلمة المرور لازم تكون 6 أحرف على الأقل");
    return;
  }
  auth.currentUser.updatePassword(newPass)
  .then(()=> alert("تم تغيير كلمة المرور بنجاح 🔥"))
  .catch(error=> alert(error.message));
}

function logout(){
  auth.signOut().then(()=> window.location.href="login.html");
}

function goBack(){
  if(document.referrer){
    history.back();
  }else{
    location.href="dashboard.html";
  }
}
</script>

</body>
</html>
