    <!-- Firebase SDK -->

    <style>
        *{margin:0;padding:0;box-sizing:border-box;}

        body{
          font-family:'Cairo',sans-serif;
          background:url("Object/qa.jpg") no-repeat center center fixed;
          background-size:cover;
          color:white;
          max-width:420px;
          margin:auto;
        }

        body::before{
          content:"";
          position:fixed;
          inset:0;
          background:rgba(0,0,0,0.85);
          z-index:-1;
        }

        /* ===== Toast Notifications ===== */
        .toast-container{
          position:fixed;
          top:20px;
          left:50%;
          transform:translateX(-50%);
          z-index:9999;
          display:flex;
          flex-direction:column;
          gap:10px;
          pointer-events:none;
          max-width:350px;
          width:90%;
        }
        .toast{
          background:rgba(20,0,0,0.95);
          border:2px solid #FF0000;
          border-radius:12px;
          padding:12px 18px;
          color:white;
          font-family:'Cairo',sans-serif;
          font-size:14px;
          font-weight:bold;
          box-shadow:0 0 30px #FF0000;
          animation:toastIn 0.3s ease-out, toastOut 0.3s ease-in 2.5s forwards;
          display:flex;
          align-items:center;
          gap:10px;
          backdrop-filter:blur(10px);
          text-align:center;
          justify-content:center;
        }
        .toast.success{ border-color:#00ff00; box-shadow:0 0 30px #00ff00; }
        .toast.error{ border-color:#FF0000; box-shadow:0 0 30px #FF0000; }
        .toast.warning{ border-color:#FFA500; box-shadow:0 0 30px #FFA500; }
        @keyframes toastIn{
          from{opacity:0;transform:translateY(-20px);}
          to{opacity:1;transform:translateY(0);}
        }
        @keyframes toastOut{
          from{opacity:1;}
          to{opacity:0;transform:translateY(-20px);}
        }

        .header{
          position:sticky;
          top:0;
          display:flex;
          justify-content:space-between;
          align-items:center;
          padding:15px;
          background:rgba(0,0,0,0.9);
          border-bottom:1px solid rgba(255,215,0,0.3);
          backdrop-filter:blur(10px);
          z-index:10;
        }
        .header h1{
          font-size:18px;
          font-weight:900;
          color:gold;
          text-shadow:0 0 15px gold;
          margin:0;
        }
        .back{
          font-size:13px;
          color:#00ffcc;
          cursor:pointer;
        }

        .container{
          padding:15px;
          display:flex;
          flex-direction:column;
          gap:20px;
        }

        .card{
          background:rgba(0,0,0,0.7);
          border:2px solid gold;
          border-radius:20px;
          padding:15px;
          box-shadow:0 0 15px rgba(255,215,0,0.4);
        }
        .card h2{
          color:gold;
          font-size:16px;
          margin-bottom:8px;
          text-align:center;
        }

        .link-box{
          background:#111;
          padding:15px;
          border-radius:15px;
          border:1px solid gold;
          word-break:break-all;
          font-size:14px;
          color:#00ffcc;
          text-align:center;
        }

        button{
          width:100%;
          padding:12px;
          border:none;
          border-radius:15px;
          background:gold;
          color:black;
          font-weight:bold;
          cursor:pointer;
          box-shadow:0 0 15px gold;
          font-family:'Cairo',sans-serif;
          margin:8px 0;
          transition:all 0.2s;
        }
        button:hover:not(:disabled){
          transform:translateY(-2px);
          box-shadow:0 0 25px gold;
        }

        .stats{
          display:grid;
          grid-template-columns:repeat(2,1fr);
          gap:15px;
        }
        .stat{
          background:rgba(0,0,0,0.7);
          border:2px solid gold;
          border-radius:20px;
          padding:15px;
          text-align:center;
        }
        .stat p{
          color:gold;
          font-weight:600;
        }
        .stat h3{
          color:#00ffcc;
          font-size:24px;
          margin-top:5px;
        }

        .note{
          color:#ccc;
          font-size:12px;
          text-align:center;
        }
    </style>

<body>

<div class="toast-container" id="toastContainer"></div>

<div class="header">
  <h1>🔗 دعوة الأصدقاء</h1>
  <div class="back" onclick="goBack()">⬅ رجوع</div>
</div>

<div class="container">

  <div class="card">
    <h2>اربح كوينز بدعوة أصدقائك</h2>
    <p style="color:#00ffcc; text-align:center;">كل صديق يسجل من رابطك يعطيك 10 كوينز</p>
  </div>

  <div class="card">
    <div class="link-box" id="inviteLink">جاري تحميل الرابط...</div>
    <button onclick="copyLink()" id="copyBtn">نسخ الرابط</button>
  </div>

  <div class="stats">
    <div class="stat">
      <p>عدد الدعوات</p>
      <h3 id="invitesCount">0</h3>
    </div>
    <div class="stat">
      <p>أرباحك</p>
      <h3 id="earnings">0 🪙</h3>
    </div>
  </div>

  <div class="note">سيتم إضافة 10 كوينز فور تسجيل صديقك عبر رابطك</div>

  <button onclick="window.location.href='dashboard.html'">العودة للوحة التحكم</button>

</div>

<script>
// ========== Toast ==========
function showCustomToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
  toast.innerHTML = (icons[type] || '✅') + ' ' + message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ========== Firebase Config ==========
firebase.initializeApp({
  apiKey: "AIzaSyB78JT_cbPMizvzKWBrQoQUe3-zukHrr1U",
  authDomain: "pharacoin.firebaseapp.com",
  projectId: "pharacoin"
});

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let unsubscribeUser = null;

// التحقق من تسجيل الدخول
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    currentUser = user;
    // بناء رابط الدعوة الفريد
    const baseUrl = window.location.origin + "/register.html";
    const inviteLink = `${baseUrl}?ref=${user.uid}`;
    document.getElementById('inviteLink').innerText = inviteLink;
    
    // الاستماع لتغييرات بيانات المستخدم
    if (unsubscribeUser) unsubscribeUser();
    unsubscribeUser = db.collection("users").doc(user.uid).onSnapshot((doc) => {
      if (doc.exists) {
        const data = doc.data();
        const referralCount = data.referralCount || 0;
        const earnings = referralCount * 10; // 10 كوينز لكل دعوة
        document.getElementById('invitesCount').innerText = referralCount;
        document.getElementById('earnings').innerHTML = earnings + ' 🪙';
      } else {
        // إذا لم يكن المستند موجوداً (لأول مرة)، ننشئه بالحقول الافتراضية
        db.collection("users").doc(user.uid).set({
          referralCount: 0
        }, { merge: true });
      }
    }, (error) => {
      console.error("خطأ في الاستماع:", error);
      showCustomToast("فشل تحميل الإحصائيات", "error");
    });
  }
});

// نسخ الرابط
function copyLink() {
  const link = document.getElementById('inviteLink').innerText;
  if (link && link !== 'جاري تحميل الرابط...') {
    navigator.clipboard.writeText(link);
    showCustomToast('تم نسخ الرابط! شاركه مع أصدقائك', 'success');
  } else {
    showCustomToast('الرابط غير متاح بعد', 'error');
  }
}

function goBack() {
  if (document.referrer) history.back();
  else location.href = "dashboard.html";
}
</script>
