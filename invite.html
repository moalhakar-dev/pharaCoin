<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة الأصدقاء - PharaCoin</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Cairo',sans-serif;
  background:url("Object/qa.jpg") no-repeat center center fixed;
  background-size:cover;
  color:white;
  max-width:420px;
  margin:auto;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  z-index:-1;
}

/* ===== Header ===== */
.header{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  font-size:18px;
  font-weight:900;
  color:gold;
  text-shadow:0 0 15px gold;
  background:rgba(0,0,0,0.9);
  border-bottom:1px solid rgba(255,215,0,0.3);
  backdrop-filter:blur(10px);
  z-index:10;
}

.back{
  font-size:13px;
  color:#00ffcc;
  cursor:pointer;
}

/* ===== Container ===== */
.container{
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:20px;
  text-align:center;
}

/* ===== Card ===== */
.card{
  background:rgba(0,0,0,0.7);
  border:2px solid gold;
  border-radius:20px;
  padding:15px;
  box-shadow:0 0 15px rgba(255,215,0,0.4);
}

/* ===== Link Box ===== */
.link-box{
  background:#111;
  padding:15px;
  border-radius:15px;
  border:1px solid gold;
  word-break:break-all;
  font-size:14px;
  color:#00ffcc;
}

/* ===== Button ===== */
button{
  padding:12px 22px;
  border:none;
  border-radius:15px;
  background:gold;
  color:black;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 15px gold;
  font-family:'Cairo',sans-serif;
}

button:hover{
  background:orange;
}

/* ===== Stats ===== */
.stats{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.stat{
  background:rgba(0,0,0,0.7);
  border:2px solid gold;
  border-radius:20px;
  padding:15px;
  box-shadow:0 0 15px rgba(255,215,0,0.4);
}

.stat h3{
  color:gold;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="header">
  <div>🔗 دعوة الأصدقاء</div>
  <div class="back" onclick="goBack()">⬅ رجوع</div>
</div>

<div class="container">

<div class="card">
  <h3 style="color:gold;">اربح كوينز بدعوة أصدقائك</h3>
  <p style="color:#00ffcc;">كل صديق يسجل من رابطك يعطيك 50 كوين</p>
</div>

<div class="card">
  <div class="link-box" id="inviteLink">
    https://pharacoin.com/register?ref=USER123
  </div>
  <br>
  <button onclick="copyLink()">نسخ الرابط</button>
</div>

<div class="stats">
  <div class="stat">
    <p>عدد الدعوات</p>
    <h3 id="invitesCount">0</h3>
  </div>

  <div class="stat">
    <p>أرباحك</p>
    <h3 id="earnings">0 🪙</h3>
  </div>
</div>

<button onclick="location.href='dashboard.html'">العودة للوحة التحكم</button>

</div>

<script>
function copyLink(){
  var text = document.getElementById("inviteLink").innerText;
  navigator.clipboard.writeText(text);
  alert("تم نسخ رابط الدعوة");
}

function goBack(){
  if(document.referrer){
    history.back();
  }else{
    location.href="dashboard.html";
  }
}
</script>

</body>
</html>
