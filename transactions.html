<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجل المعاملات — PharaCoin</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%;
  min-height:100%;
  font-family:'Cairo', sans-serif;
  color:#fff;
}
body {
  max-width:480px;
  margin:0 auto;
  position:relative;
  padding-bottom:100px;
  background:transparent;
}

.page-bg {
  position:fixed;
  inset:0;
  z-index:-5;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}
.page-bg::after {
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(180deg, rgba(0,0,0,0.15), rgba(0,0,0,0.65));
}

.header {
  display:flex; justify-content:space-between; align-items:center;
  padding:16px 18px;
  position:sticky; top:0; z-index:50;
  background:rgba(0,0,0,0.85);
  border-bottom:1px solid rgba(255,215,0,0.15);
  backdrop-filter:blur(15px);
}
.logo {
  display:flex; align-items:center; gap:8px;
  color:gold; font-weight:800; font-size:17px;
}
.balance-box {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,215,0,0.08);
  border:1px solid rgba(255,215,0,0.25);
  padding:6px 14px; border-radius:20px;
  font-size:13px; font-weight:700;
}
.container {
  margin:20px 16px;
  background:rgba(0,0,0,0.65);
  border:1px solid rgba(255,215,0,0.15);
  border-radius:20px;
  padding:24px;
  backdrop-filter:blur(10px);
}
.title {
  text-align:center;
  font-size:20px;
  font-weight:900;
  color:gold;
  margin-bottom:16px;
}

.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  justify-content: center;
}
.filter-btn {
  background: rgba(255,215,0,0.1);
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: 30px;
  padding: 8px 16px;
  color: gold;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-btn.active {
  background: gold;
  color: black;
  border-color: gold;
  box-shadow: 0 0 15px gold;
}

.transaction-list {
  display:flex;
  flex-direction:column;
  gap:12px;
  max-height:400px;
  overflow-y:auto;
  margin-bottom: 10px;
  min-height: 200px;
}
.transaction-item {
  background:rgba(255,215,0,0.08);
  border:1px solid rgba(255,215,0,0.2);
  border-radius:12px;
  padding:12px;
  transition: all 0.2s;
}
.transaction-item:hover {
  background:rgba(255,215,0,0.15);
  transform: translateY(-2px);
}
.transaction-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.transaction-type {
  display: flex;
  align-items: center;
  gap: 8px;
}
.status-badge {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: bold;
}
.status-pending {
  background: #ff9900;
  color: black;
}
.status-completed {
  background: #00cc66;
  color: black;
}
.status-rejected {
  background: #ff3333;
  color: white;
}
.transaction-amount {
  color: gold;
  font-weight: bold;
  font-size: 16px;
}
.transaction-details {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  font-size: 12px;
  color: #ccc;
  margin: 8px 0;
  border-top: 1px dashed rgba(255,215,0,0.2);
  padding-top: 8px;
}
.detail-item {
  display: flex;
  align-items: center;
  gap: 4px;
}
.transaction-time {
  color: #888;
  font-size: 11px;
  text-align: left;
}
.empty-msg {
  text-align:center;
  color:#aaa;
  padding:40px 0;
  font-size: 14px;
}
.empty-msg span {
  font-size: 40px;
  display: block;
  margin-bottom: 10px;
}
.btn {
  width:100%;
  padding:14px;
  background:linear-gradient(135deg,#FFD700,#FFA500);
  border:none;
  border-radius:50px;
  font-weight:900;
  font-size:16px;
  color:#000;
  margin-top:15px;
  cursor:pointer;
  transition: all 0.2s;
}
.btn:hover {
  transform: scale(1.02);
  box-shadow: 0 0 20px gold;
}

.toast-container {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:9999;
  display:flex;
  flex-direction:column;
  gap:10px;
  pointer-events:none;
  max-width:350px;
  width:90%;
}
.toast {
  background:rgba(20,0,0,0.95);
  border:2px solid #FF0000;
  border-radius:12px;
  padding:12px 18px;
  color:white;
  font-family:'Cairo',sans-serif;
  font-size:14px;
  font-weight:bold;
  box-shadow:0 0 30px #FF0000;
  animation:toastIn 0.3s ease-out, toastOut 0.3s ease-in 2.5s forwards;
  display:flex;
  align-items:center;
  gap:10px;
  backdrop-filter:blur(10px);
  text-align:center;
  justify-content:center;
}
.toast.success { border-color:#00ff00; box-shadow:0 0 30px #00ff00; }
.toast.error { border-color:#FF0000; box-shadow:0 0 30px #FF0000; }
.toast.warning { border-color:#FFA500; box-shadow:0 0 30px #FFA500; }
@keyframes toastIn {
  from{opacity:0;transform:translateY(-20px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes toastOut {
  from{opacity:1;}
  to{opacity:0;transform:translateY(-20px);}
}

.loader {
  display: inline-block;
  width: 30px;
  height: 30px;
  border: 3px solid rgba(255,215,0,0.3);
  border-radius: 50%;
  border-top-color: gold;
  animation: spin 1s ease-in-out infinite;
  margin: 20px auto;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  max-width:480px; margin:0 auto;
  background:linear-gradient(180deg, #8b1a1a, #6a0d0d);
  display:flex; justify-content:space-around;
  padding:10px 0 18px;
  border-top: 3px solid #e6b422;
  box-shadow: 0 -5px 20px rgba(0,0,0,0.8), 0 0 15px #b8860b;
  z-index:100;
}

.nav-item {
  text-align:center;
  cursor:pointer;
  transition: transform 0.2s;
  width: 70px;
  position: relative;
}
.nav-item:active {
  transform: scale(0.95);
}

.nav-circle {
  width:55px;
  height:55px;
  border-radius:50%;
  background: #1a0e0e;
  border: 2px solid #b22222;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 30px;
  color: #b22222;
  margin: 0 auto 4px;
  transition: all 0.3s ease;
  box-shadow: 0 0 10px rgba(180, 40, 40, 0.6);
}

.nav-item.current-page .nav-circle {
  color: #FFD700;
  border-color: #FFD700;
  box-shadow: 0 0 15px #FFD700;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 5px #FFD700; }
  50% { box-shadow: 0 0 20px #FFD700; }
  100% { box-shadow: 0 0 5px #FFD700; }
}

.nav-label {
  font-size: 12px;
  font-weight: 700;
  color: #ffdb8e;
  text-shadow: 0 0 5px #b8860b;
  display: none;
  height: 18px;
  margin-top: 2px;
}

.nav-item.showing .nav-label {
  display: block;
}
</style>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="page-bg" id="pageBg"></div>

<div class="header">
  <div class="logo">🏺 PharaCoin</div>
  <div class="balance-box">💰 <span id="headerCoins">0</span> 🪙</div>
</div>

<div class="container">
  <div class="title">📋 سجل المعاملات</div>
  
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterTransactions('all')" id="filterAll">الكل</button>
    <button class="filter-btn" onclick="filterTransactions('pending')" id="filterPending">⏳ قيد المراجعة</button>
    <button class="filter-btn" onclick="filterTransactions('completed')" id="filterCompleted">✅ مكتمل</button>
    <button class="filter-btn" onclick="filterTransactions('rejected')" id="filterRejected">❌ مرفوض</button>
  </div>
  
  <div class="transaction-list" id="transactionList">
    <div class="loader" style="margin: 40px auto;"></div>
  </div>
  
  <button class="btn" onclick="window.location.href='dashboard.html'">🔙 العودة للرئيسية</button>
</div>

<div class="bottom-nav">
  <div class="nav-item" data-url="dashboard.html" data-label="الرئيسية" data-egypt="𓂀" data-alt="🏠">
    <div class="nav-circle">𓂀</div>
    <div class="nav-label">الرئيسية</div>
  </div>
  <div class="nav-item" data-url="museum.html" data-label="المتحف" data-egypt="𓆣" data-alt="🏺">
    <div class="nav-circle">𓆣</div>
    <div class="nav-label">المتحف</div>
  </div>
  <div class="nav-item" data-url="statue-builder.html" data-label="التجميع" data-egypt="𓁹" data-alt="⚒️">
    <div class="nav-circle">𓁹</div>
    <div class="nav-label">التجميع</div>
  </div>
  <div class="nav-item" data-url="profile.html" data-label="حسابي" data-egypt="☥" data-alt="👤">
    <div class="nav-circle">☥</div>
    <div class="nav-label">حسابي</div>
  </div>
</div>

<script>
// ========== Toast للرسائل ==========
function showCustomToast(message, type = 'success') {
  let container = document.getElementById('toastContainer');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toastContainer';
    container.className = 'toast-container';
    document.body.appendChild(container);
  }
  
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
  toast.innerHTML = (icons[type] || '✅') + ' ' + message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ========== تهيئة Firebase ==========
firebase.initializeApp({
  apiKey: "AIzaSyB78JT_cbPMizvzKWBrQoQUe3-zukHrr1U",
  authDomain: "pharacoin.firebaseapp.com",
  projectId: "pharacoin"
});

const auth = firebase.auth();
const db = firebase.firestore();

// تحديث العملات المعروضة
function updateHeaderCoins() {
  const user = auth.currentUser;
  if (user) {
    db.collection("users").doc(user.uid).get().then(doc => {
      if (doc.exists) {
        document.getElementById('headerCoins').innerText = doc.data().coins || '0';
      }
    }).catch(() => {
      document.getElementById('headerCoins').innerText = localStorage.getItem('coins') || '0';
    });
  } else {
    document.getElementById('headerCoins').innerText = localStorage.getItem('coins') || '0';
  }
}

// متغيرات عامة
let currentUser = null;
let allTransactions = [];
let currentFilter = 'all';

// التحقق من تسجيل الدخول
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    currentUser = user;
    updateHeaderCoins();
    loadAllTransactions();
  }
});

// تحميل جميع المعاملات (إيداع + سحب + VIP)
async function loadAllTransactions() {
  if (!currentUser) return;
  
  const listEl = document.getElementById('transactionList');
  listEl.innerHTML = '<div class="loader" style="margin: 40px auto;"></div>';
  
  try {
    console.log("جاري تحميل المعاملات للمستخدم:", currentUser.uid);
    
    // جلب الإيداعات
    const depositsSnap = await db.collection("deposits")
      .where("userId", "==", currentUser.uid)
      .orderBy("createdAt", "desc")
      .get();
    
    // جلب السحوبات
    const withdrawalsSnap = await db.collection("withdrawals")
      .where("userId", "==", currentUser.uid)
      .orderBy("createdAt", "desc")
      .get();
    
    // جلب طلبات VIP
    const vipSnap = await db.collection("vip_requests")
      .where("userId", "==", currentUser.uid)
      .orderBy("requestedAt", "desc")
      .get();
    
    console.log("إيداعات:", depositsSnap.size, "سحوبات:", withdrawalsSnap.size, "VIP:", vipSnap.size);
    
    // دمج المعاملات
    allTransactions = [];
    
    depositsSnap.forEach(doc => {
      const data = doc.data();
      allTransactions.push({
        id: doc.id,
        type: 'deposit',
        method: data.method,
        fromNumber: data.fromNumber,
        amount: data.amount,
        coins: data.coins,
        status: data.status,
        createdAt: data.createdAt
      });
    });
    
    withdrawalsSnap.forEach(doc => {
      const data = doc.data();
      allTransactions.push({
        id: doc.id,
        type: 'withdraw',
        method: data.method,
        address: data.address,
        amount: data.amount,
        currency: data.currency || 'USD', // ✅ العملة الأصلية (افتراضي دولار)
        status: data.status,
        createdAt: data.createdAt
      });
    });
    
    vipSnap.forEach(doc => {
      const data = doc.data();
      allTransactions.push({
        id: doc.id,
        type: 'vip',
        planName: data.planName,
        planLevel: data.planLevel,
        priceUSD: data.priceUSD,
        priceCoins: data.priceCoins,
        status: data.status,
        createdAt: data.requestedAt
      });
    });
    
    // ترتيب تنازلي حسب التاريخ (الأحدث أولاً)
    allTransactions.sort((a, b) => {
      const timeA = a.createdAt ? a.createdAt.seconds : 0;
      const timeB = b.createdAt ? b.createdAt.seconds : 0;
      return timeB - timeA;
    });
    
    if (allTransactions.length === 0) {
      listEl.innerHTML = `
        <div class="empty-msg">
          <span>📭</span>
          لا توجد معاملات بعد<br>
          <small style="color:#888; font-size:12px;">قم بإجراء إيداع أو سحب أولاً</small>
        </div>
      `;
      return;
    }
    
    renderTransactions();
    
  } catch (err) {
    console.error("🔥 خطأ مفصل:", err);
    
    let errorMessage = '';
    if (err.code === 'permission-denied') {
      errorMessage = '❌ ليس لديك صلاحية لعرض المعاملات. تأكد من قواعد Firestore.';
    } else if (err.code === 'unavailable') {
      errorMessage = '❌ لا يمكن الاتصال بقاعدة البيانات. تحقق من اتصالك بالإنترنت.';
    } else if (err.code === 'not-found') {
      errorMessage = '❌ المجموعات غير موجودة. قم بإنشاء معاملة أولاً.';
    } else {
      errorMessage = '❌ حدث خطأ في تحميل المعاملات: ' + err.message;
    }
    
    listEl.innerHTML = `<div class="empty-msg"><span>⚠️</span>${errorMessage}</div>`;
    showCustomToast("فشل تحميل المعاملات", "error");
  }
}

// عرض المعاملات حسب الفلتر
function renderTransactions() {
  const listEl = document.getElementById('transactionList');
  
  // تصفية حسب الحالة
  let filtered = allTransactions;
  if (currentFilter !== 'all') {
    filtered = allTransactions.filter(t => t.status === currentFilter);
  }
  
  if (filtered.length === 0) {
    let filterText = '';
    if (currentFilter === 'pending') filterText = 'معلقة';
    else if (currentFilter === 'completed') filterText = 'مكتملة';
    else if (currentFilter === 'rejected') filterText = 'مرفوضة';
    
    listEl.innerHTML = `
      <div class="empty-msg">
        <span>📭</span>
        لا توجد معاملات ${filterText ? filterText : ''}
      </div>
    `;
    return;
  }
  
  listEl.innerHTML = filtered.map(tx => {
    // تنسيق التاريخ
    let dateStr = 'تاريخ غير متوفر';
    if (tx.createdAt && tx.createdAt.seconds) {
      const date = new Date(tx.createdAt.seconds * 1000);
      dateStr = date.toLocaleString('ar-EG', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    } else if (tx.createdAt && tx.createdAt.toDate) {
      const date = tx.createdAt.toDate();
      dateStr = date.toLocaleString('ar-EG', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }
    
    // تحديد النص واللون حسب الحالة
    let statusClass = '';
    let statusText = '';
    if (tx.status === 'pending') {
      statusClass = 'status-pending';
      statusText = '⏳ قيد المراجعة';
    } else if (tx.status === 'completed') {
      statusClass = 'status-completed';
      statusText = '✅ مكتمل';
    } else if (tx.status === 'rejected') {
      statusClass = 'status-rejected';
      statusText = '❌ مرفوض';
    } else {
      statusClass = '';
      statusText = tx.status || 'غير معروف';
    }
    
    // عرض مختلف حسب نوع المعاملة
    if (tx.type === 'deposit') {
      return `
        <div class="transaction-item">
          <div class="transaction-header">
            <div class="transaction-type">
              <span style="color:gold; font-weight:bold;">💰 إيداع</span>
              <span class="status-badge ${statusClass}">${statusText}</span>
            </div>
            <div class="transaction-amount">${tx.amount || 0} ${tx.amount ? 'جنيه' : ''}</div>
          </div>
          <div class="transaction-details">
            <div class="detail-item">📱 ${tx.method || 'غير محدد'}</div>
            <div class="detail-item">🆔 من: ${tx.fromNumber || 'غير محدد'}</div>
            <div class="detail-item">🪙 ${tx.coins || 0} Coins</div>
          </div>
          <div class="transaction-time">${dateStr}</div>
        </div>
      `;
    } else if (tx.type === 'withdraw') {
      // ✅ عرض العملة الأصلية
      const currencySymbol = tx.currency === 'EGP' ? 'جنيه' : 'دولار';
      return `
        <div class="transaction-item">
          <div class="transaction-header">
            <div class="transaction-type">
              <span style="color:gold; font-weight:bold;">💸 سحب</span>
              <span class="status-badge ${statusClass}">${statusText}</span>
            </div>
            <div class="transaction-amount">${tx.amount || 0} ${currencySymbol}</div>
          </div>
          <div class="transaction-details">
            <div class="detail-item">📱 ${tx.method || 'غير محدد'}</div>
            <div class="detail-item">📍 العنوان: ${tx.address || 'غير محدد'}</div>
          </div>
          <div class="transaction-time">${dateStr}</div>
        </div>
      `;
    } else if (tx.type === 'vip') {
      return `
        <div class="transaction-item">
          <div class="transaction-header">
            <div class="transaction-type">
              <span style="color:gold; font-weight:bold;">👑 اشتراك VIP</span>
              <span class="status-badge ${statusClass}">${statusText}</span>
            </div>
            <div class="transaction-amount">${tx.priceUSD || 0} دولار</div>
          </div>
          <div class="transaction-details">
            <div class="detail-item">📊 الباقة: ${tx.planName || 'غير محدد'}</div>
            <div class="detail-item">🪙 ${tx.priceCoins || 0} Coins</div>
            <div class="detail-item">🕐 ${dateStr}</div>
          </div>
        </div>
      `;
    }
  }).join('');
}

// تغيير الفلتر
function filterTransactions(filter) {
  currentFilter = filter;
  
  document.getElementById('filterAll').classList.remove('active');
  document.getElementById('filterPending').classList.remove('active');
  document.getElementById('filterCompleted').classList.remove('active');
  document.getElementById('filterRejected').classList.remove('active');
  
  if (filter === 'all') document.getElementById('filterAll').classList.add('active');
  else if (filter === 'pending') document.getElementById('filterPending').classList.add('active');
  else if (filter === 'completed') document.getElementById('filterCompleted').classList.add('active');
  else if (filter === 'rejected') document.getElementById('filterRejected').classList.add('active');
  
  renderTransactions();
}

// الخلفية
const bg = document.getElementById('pageBg');
const localImg = "Object/qa.jpg";
const fallback = "https://images.pexels.com/photos/3350783/pexels-photo-3350783.jpeg?auto=compress&cs=tinysrgb&w=1260";
const img = new Image();
img.onload = () => { bg.style.backgroundImage = `url('${localImg}')`; };
img.onerror = () => { bg.style.backgroundImage = `url('${fallback}')`; };
img.src = localImg + "?v=" + Date.now();

// آلية النقر للـ Navbar
const navItems = document.querySelectorAll('.nav-item');
const currentPath = window.location.pathname.split('/').pop() || 'transactions.html';
navItems.forEach(item => item.classList.remove('current-page'));
navItems.forEach(item => {
  if (item.dataset.url === currentPath) {
    item.classList.add('current-page');
  }
});

let effectShown = new Array(navItems.length).fill(false);
let timerId = null;
let currentNavItem = null;

function showEffect(item) {
  if (item.classList.contains('current-page')) return;
  
  if (timerId) {
    clearTimeout(timerId);
    timerId = null;
    if (currentNavItem) {
      const oldCircle = currentNavItem.querySelector('.nav-circle');
      const oldEgypt = currentNavItem.dataset.egypt;
      oldCircle.textContent = oldEgypt;
      currentNavItem.classList.remove('showing');
    }
  }
  
  currentNavItem = item;
  const circle = item.querySelector('.nav-circle');
  const altSymbol = item.dataset.alt;
  circle.textContent = altSymbol;
  item.classList.add('showing');
  
  timerId = setTimeout(() => {
    const circle = currentNavItem.querySelector('.nav-circle');
    const egyptSymbol = currentNavItem.dataset.egypt;
    circle.textContent = egyptSymbol;
    currentNavItem.classList.remove('showing');
    timerId = null;
    currentNavItem = null;
  }, 3000);
}

navItems.forEach((item, index) => {
  item.addEventListener('click', function(e) {
    e.stopPropagation();
    
    if (this.classList.contains('current-page')) return;
    
    if (effectShown[index]) {
      window.location.href = this.dataset.url;
      return;
    }
    
    showEffect(this);
    effectShown[index] = true;
  });
});
</script>
</body>
</html>
