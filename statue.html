<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تجميع التمثال — PharaCoin</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Cairo',sans-serif;
  background:#050505;
  color:#fff;
  max-width:480px;
  margin:auto;
  padding-bottom:80px;
}

.page-bg{
  position:fixed;inset:0;
  background:url("Object/qa.jpg") center/cover no-repeat;
  filter:brightness(0.2);
  z-index:-1;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  background:rgba(0,0,0,0.85);
  border-bottom:1px solid rgba(255,215,0,0.2);
}

.logo{color:gold;font-weight:900;font-size:16px}

.balance{
  background:rgba(255,215,0,0.1);
  padding:6px 14px;
  border-radius:20px;
  border:1px solid rgba(255,215,0,0.3);
  font-weight:700;
}

.section-title{
  text-align:center;
  margin:18px 0;
  color:gold;
  font-size:18px;
  font-weight:800;
}

.box{
  margin:0 16px;
  padding:16px;
  background:rgba(0,0,0,0.6);
  border-radius:16px;
  border:1px solid rgba(255,215,0,0.2);
  backdrop-filter:blur(10px);
}

.progress-bar{
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}
.progress{
  height:12px;
  width:0%;
  background:linear-gradient(90deg,#FFD700,#FFA500,#FF6347);
  transition:.5s;
}

.parts{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:14px;
}

.part{
  background:#0b0b0b;
  border:2px solid rgba(255,215,0,0.4);
  border-radius:14px;
  padding:10px;
  text-align:center;
}
.part img{
  width:100%;
  border-radius:10px;
}
.part button{
  margin-top:8px;
  width:100%;
  padding:8px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#FFD700,#FFA500);
  font-weight:800;
  cursor:pointer;
}

.message{
  text-align:center;
  color:#00ff9d;
  margin-top:10px;
  font-weight:700;
}

.toast-container{
  position:fixed;
  top:70px;
  left:50%;
  transform:translateX(-50%);
  z-index:999;
}
.toast{
  background:#111;
  border:1px solid gold;
  border-radius:12px;
  padding:10px 18px;
  margin-top:8px;
  animation:fade .3s;
}
@keyframes fade{from{opacity:0;transform:translateY(-10px)}to{opacity:1}}

.transition{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,gold,#000);
  display:none;
  align-items:center;
  justify-content:center;
  font-size:26px;
  font-weight:900;
  z-index:9999;
  color:black;
}
</style>
</head>

<body>

<div class="page-bg"></div>

<div class="transition" id="transition">👑 جاري الدخول للمملكة...</div>

<div class="header">
  <div class="logo">🏺 PharaCoin</div>
  <div class="balance">💰 <span id="coins">0</span> 🪙</div>
</div>

<div class="toast-container" id="toast"></div>

<div class="section-title">⚒️ تجميع التمثال الأول</div>

<div class="box">

<p style="text-align:center;color:rgba(255,255,255,0.6)">
أضف كل الأجزاء لإكمال التمثال
</p>

<div class="progress-bar">
  <div class="progress" id="progress"></div>
</div>

<div class="parts">
  <div class="part">
    <img src="Object/statue1_part1.jpg">
    <button onclick="addPart(0)">إضافة الجزء</button>
  </div>
  <div class="part">
    <img src="Object/statue1_part2.jpg">
    <button onclick="addPart(1)">إضافة الجزء</button>
  </div>
  <div class="part">
    <img src="Object/statue1_part3.jpg">
    <button onclick="addPart(2)">إضافة الجزء</button>
  </div>
  <div class="part">
    <img src="Object/statue1_part4.jpg">
    <button onclick="addPart(3)">إضافة الجزء</button>
  </div>
</div>

<div class="message" id="msg"></div>

</div>

<script>
let coins = localStorage.getItem("coins")
  ? parseInt(localStorage.getItem("coins"))
  : 0;

let tutorialDone = localStorage.getItem("tutorialDone")==="true";
let parts=[false,false,false,false];

const coinsSpan=document.getElementById("coins");
const progress=document.getElementById("progress");
const msg=document.getElementById("msg");
const buttons=document.querySelectorAll(".part button");
const toast=document.getElementById("toast");

coinsSpan.innerText=coins;

function showToast(text){
  const t=document.createElement("div");
  t.className="toast";
  t.innerText=text;
  toast.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

function updateUI(){
  let completed=parts.filter(p=>p).length;
  progress.style.width=(completed/4)*100+"%";

  parts.forEach((p,i)=>{
    if(p){
      buttons[i].disabled=true;
      buttons[i].innerText="✔ تمت";
    }
  });

  if(completed===4) finish();
}

function addPart(i){
  if(parts[i]) return;
  parts[i]=true;
  msg.innerText="✨ تم إضافة الجزء";
  showToast("تمت إضافة جزء جديد");
  updateUI();
}

function finish(){
  if(!tutorialDone){
    coins+=20;
    localStorage.setItem("coins",coins);
    localStorage.setItem("tutorialDone","true");
    msg.innerText="🎉 ربحت 20 عملة!";
  }else{
    msg.innerText="✔ التوتوريال مكتمل مسبقًا";
  }
  coinsSpan.innerText=coins;
  document.getElementById("transition").style.display="flex";
  setTimeout(()=>{
    window.location.href="statue1.html";
  },2000);
}

updateUI();
</script>

</body>
</html>
