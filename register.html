<script>
// ========== دالة عرض الرسائل المخصصة ==========
function showCustomToast(message, type = 'error') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  
  let icon = '❌';
  if(type === 'success') icon = '✅';
  if(type === 'warning') icon = '⚠️';
  if(type === 'info') icon = 'ℹ️';
  
  toast.innerHTML = icon + ' ' + message;
  container.appendChild(toast);
  
  setTimeout(() => {
    toast.remove();
  }, 3000);
}

// ========== التحقق من أن الرقم مصري ==========
function isEgyptianPhone(phone) {
  let cleanPhone = phone.replace(/\s+/g, '').replace(/[^\d+]/g, '');
  const egyptianPatterns = [
    /^01[0-9]{9}$/,           // 010xxxxxxxx
    /^\+201[0-9]{9}$/,        // +2010xxxxxxxx
    /^00201[0-9]{9}$/         // 002010xxxxxxxx
  ];
  return egyptianPatterns.some(pattern => pattern.test(cleanPhone));
}

// ========== التحقق من صيغة البريد الإلكتروني ==========
function isValidEmail(email) {
  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return emailPattern.test(email);
}

// ========== تحويل الرقم إلى بريد وهمي (نفس دالة login) ==========
function convertToFirebaseEmail(input) {
  // إذا كان الإدخال يبدو كبريد إلكتروني، نرجعه كما هو
  if(input.includes('@') && isValidEmail(input)) {
    return input;
  }
  
  // إذا كان رقماً، ننظفه ونحوله إلى بريد وهمي
  let cleanInput = input.replace(/\s+/g, '').replace(/[^\d+]/g, '');
  
  // التأكد من أن الرقم مصري
  if(!isEgyptianPhone(cleanInput)) {
    return null; // رقم غير مصري
  }
  
  // إزالة أي رموز غير أرقام للتحويل
  let digitsOnly = cleanInput.replace(/\D/g, '');
  if(digitsOnly.length === 11 && digitsOnly.startsWith('01')) {
    // 01012345678 → 01012345678@pharacoinsupport.com
    return digitsOnly + '@pharacoinsupport.com';
  } else if(digitsOnly.length === 12 && digitsOnly.startsWith('201')) {
    // 201012345678 → 01012345678@pharacoinsupport.com
    return '0' + digitsOnly.substring(2) + '@pharacoinsupport.com';
  }
  
  return null;
}

// ========== قراءة معرف الداعي من الرابط (إن وجد) ==========
const urlParams = new URLSearchParams(window.location.search);
const referrerId = urlParams.get('ref'); // معرف المستخدم الذي دعا

// ========== Captcha ==========
const captchaNum1 = Math.floor(Math.random() * 10) + 1;
const captchaNum2 = Math.floor(Math.random() * 10) + 1;
document.getElementById("captchaQuestion").innerText = `${captchaNum1} + ${captchaNum2} = ؟`;
const captchaResult = captchaNum1 + captchaNum2;

// ========== إظهار/إخفاء كلمة المرور ==========
document.querySelectorAll(".eye").forEach(function(eye){
  eye.addEventListener("click", function(){
    let input = this.parentElement.querySelector("input");
    if(input.type === "password"){
      input.type = "text";
      this.textContent = "🙈";
    }else{
      input.type = "password";
      this.textContent = "👁️";
    }
  });
  eye.addEventListener("keydown", function(e){
    if(e.key === "Enter" || e.key === " "){
      e.preventDefault();
      this.click();
    }
  });
});

// ========== قياس قوة كلمة المرور ==========
const passwordInput = document.getElementById("password");
const strengthBar = document.querySelector(".strength span");

passwordInput.addEventListener("input", function(){
  let value = passwordInput.value;
  let strength = 0;
  if(value.length >= 6) strength++;
  if(/[A-Z]/.test(value)) strength++;
  if(/[0-9]/.test(value)) strength++;
  if(/[^A-Za-z0-9]/.test(value)) strength++;

  strengthBar.style.width = (strength*25)+"%";
  strengthBar.style.background = ["red","orange","gold","lime"][strength-1] || "red";
});

// ========== تهيئة Firebase ==========
firebase.initializeApp({
  apiKey: "AIzaSyB78JT_cbPMizvzKWBrQoQUe3-zukHrr1U",
  authDomain: "pharacoin.firebaseapp.com",
  projectId: "pharacoin"
});

const auth = firebase.auth();
const db = firebase.firestore();

// ========== معالج التسجيل ==========
document.getElementById("registerForm").addEventListener("submit", function(e){
  e.preventDefault();

  // التحقق من Captcha
  const userAnswer = parseInt(document.getElementById("captchaAnswer").value);
  if(userAnswer !== captchaResult){
    showCustomToast('❌ إجابة التحدي غير صحيحة. حاول مرة أخرى.', 'error');
    return;
  }

  const username = document.getElementById("username").value;
  const emailOrPhone = document.getElementById("emailOrPhone").value;
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  // التحقق من تطابق كلمة المرور
  if(password !== confirmPassword){
    showCustomToast('❌ كلمة المرور غير متطابقة', 'error');
    return;
  }

  // التحقق من أن كلمة المرور 6 أحرف على الأقل
  if(password.length < 6){
    showCustomToast('❌ كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
    return;
  }

  // تحويل الإدخال إلى بريد إلكتروني صالح لـ Firebase باستخدام الدالة الموحدة
  const firebaseEmail = convertToFirebaseEmail(emailOrPhone);
  
  if(!firebaseEmail) {
    showCustomToast('❌ يجب استخدام بريد إلكتروني صحيح أو رقم مصري صالح', 'error');
    return;
  }

  // تعطيل الزر لمنع النقر المزدوج
  const submitBtn = e.target.querySelector('button[type="submit"]');
  submitBtn.disabled = true;
  submitBtn.style.opacity = '0.7';
  submitBtn.innerText = 'جاري التسجيل...';

  // محاولة التسجيل
  auth.createUserWithEmailAndPassword(firebaseEmail, password)
    .then((userCredential) => {
      const user = userCredential.user;

      // إعداد بيانات المستخدم الجديد
      const userData = {
        username: username,
        emailOrPhone: emailOrPhone, // نخزن القيمة الأصلية
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        coins: 100, // المكافأة الترحيبية 100 جنيه (بدلاً من 200)
        xp: 0,
        vipPlan: null,
        vipExpire: null
      };

      // إذا كان هناك معرف داعي (referrer) صالح، نضيفه
      if (referrerId && referrerId !== user.uid) {
        userData.referredBy = referrerId;
      }

      // تخزين بيانات المستخدم الجديد في Firestore
      return db.collection("users").doc(user.uid).set(userData)
        .then(async () => {
          // إذا كان هناك داعي صالح، نقوم بتحديث رصيده وإحصائياته
          if (referrerId && referrerId !== user.uid) {
            try {
              // زيادة عدد الدعوات بمقدار 1
              await db.collection("users").doc(referrerId).update({
                referralCount: firebase.firestore.FieldValue.increment(1)
              });
              // زيادة رصيد الداعي بمقدار 10 كوينز
              await db.collection("users").doc(referrerId).update({
                coins: firebase.firestore.FieldValue.increment(10)
              });
              console.log("تمت مكافأة الداعي بنجاح");
            } catch (refError) {
              console.error("خطأ في تحديث الداعي:", refError);
              // لا نوقف العملية إذا فشلت مكافأة الداعي
            }
          }

          // حفظ بيانات تسجيل الدخول في localStorage
          localStorage.setItem("loginEmail", emailOrPhone);
          localStorage.setItem("loginPass", password);

          showCustomToast('✅ تم التسجيل بنجاح! مرحباً بك في عالم الفراعنة 🏺', 'success');
          setTimeout(() => {
            window.location.href = "login.html";
          }, 1500);
        });
    })
    .catch((error) => {
      // إعادة تفعيل الزر
      submitBtn.disabled = false;
      submitBtn.style.opacity = '1';
      submitBtn.innerText = 'تسجيل الحساب';
      
      // ترجمة رسائل الخطأ
      let errorMessage = '❌ حدث خطأ أثناء التسجيل';
      if(error.code === 'auth/email-already-in-use'){
        errorMessage = '❌ هذا الرقم أو البريد مستخدم بالفعل. جرب تسجيل الدخول.';
      } else if(error.code === 'auth/invalid-email'){
        errorMessage = '❌ صيغة البريد الإلكتروني غير صحيحة';
      } else if(error.code === 'auth/weak-password'){
        errorMessage = '❌ كلمة المرور ضعيفة - يجب أن تكون 6 أحرف على الأقل';
      } else {
        errorMessage = '❌ ' + error.message;
      }
      showCustomToast(errorMessage, 'error');
    });
});

function goBack(){
  if(document.referrer){
    history.back();
  }else{
    location.href="index.html";
  }
}
</script>
